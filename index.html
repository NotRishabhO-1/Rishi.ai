<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            50: '#f8f9fa',
                            100: '#f1f3f4',
                            800: '#202124',
                            900: '#171717',
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Custom Scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background-color: rgba(75, 85, 99, 0.5);
        }
        
        /* Markdown specific overrides to match Gemini style */
        .prose pre {
            background-color: #f1f3f4;
            color: #202124;
            border-radius: 0.75rem;
        }
        .dark .prose pre {
            background-color: #2d2f31;
            color: #e8eaed;
        }
        
        /* Ensure natural flow without layout breakage */
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 font-sans flex flex-col md:flex-row min-h-screen transition-colors duration-200">

    <div id="loading" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white dark:bg-gemini-900 transition-opacity duration-300">
        <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="text-lg font-medium text-gray-600 dark:text-gray-300">Loading Workspace...</span>
    </div>

    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-40 w-72 transform -translate-x-full md:translate-x-0 transition-transform duration-300 bg-gemini-50 dark:bg-gemini-800 border-r border-gray-200 dark:border-gray-700 flex flex-col h-full">
        <div class="p-4 flex items-center justify-between">
            <button id="btn-new-chat" class="flex-1 flex items-center gap-2 bg-white dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 text-sm font-medium py-2.5 px-4 rounded-full transition-colors shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
            <button id="btn-close-sidebar" class="md:hidden ml-2 p-2 text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-3 space-y-1" id="chat-history-list">
            </div>

        <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
            <button id="btn-settings" class="w-full flex items-center gap-3 p-3 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-xl transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Settings
            </button>
            <div class="text-xs text-center text-gray-400 dark:text-gray-500 mt-2">v1.0.0 • Vanilla JS</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-h-screen w-full relative">
        
        <header class="sticky top-0 z-20 flex items-center justify-between p-4 bg-white/80 dark:bg-gemini-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
            <div class="flex items-center gap-3">
                <button id="btn-toggle-sidebar" class="md:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 id="current-chat-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100 truncate max-w-[200px] md:max-w-md">New Chat</h1>
            </div>
            
            <button id="btn-theme" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full focus:outline-none transition-colors">
                </button>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 pb-32 space-y-6 w-full max-w-4xl mx-auto flex flex-col">
            <div id="welcome-screen" class="flex flex-col items-center justify-center h-full text-center space-y-4 opacity-50">
                <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mb-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-2xl font-semibold">How can I help you today?</h2>
                <p class="text-sm">Configure your API Key in Settings to get started.</p>
            </div>
            
            </div>

        <div class="sticky bottom-0 w-full bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-900 dark:via-gemini-900 pt-6 pb-4 px-4">
            <div class="max-w-4xl mx-auto relative bg-gemini-100 dark:bg-gemini-800 rounded-3xl p-1.5 flex items-end border border-gray-200 dark:border-gray-700 shadow-sm focus-within:ring-2 focus-within:ring-blue-500/50 transition-all">
                <textarea id="chat-input" rows="1" class="w-full bg-transparent text-gray-800 dark:text-gray-100 px-4 py-3 max-h-48 resize-none focus:outline-none custom-scrollbar rounded-2xl" placeholder="Message AI..."></textarea>
                <button id="btn-send" class="p-3 m-1 rounded-full bg-blue-600 hover:bg-blue-700 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0 flex items-center justify-center h-10 w-10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <div class="text-center mt-2 text-[10px] text-gray-400 dark:text-gray-500">AI can make mistakes. Verify important information.</div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 hidden backdrop-blur-sm opacity-0 transition-opacity duration-200">
        <div class="bg-white dark:bg-gemini-800 w-full max-w-md rounded-2xl shadow-2xl p-6 transform scale-95 transition-transform duration-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Settings</h3>
                <button id="btn-close-settings" class="text-gray-500 hover:text-gray-800 dark:hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="input-api-key" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 dark:text-white" placeholder="sk-or-v1-...">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model Name</label>
                    <input type="text" id="input-model" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 dark:text-white" placeholder="deepseek/deepseek-r1:free">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">System Prompt (Global)</label>
                    <textarea id="input-system-prompt" rows="3" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-900 dark:text-white text-sm" placeholder="You are a helpful assistant..."></textarea>
                </div>
            </div>
            
            <div class="mt-6 flex justify-end">
                <button id="btn-save-settings" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">Save Configurations</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // 1. STATE & CONSTANTS
            // ==========================================
            const OPENROUTER_API = 'https://openrouter.ai/api/v1/chat/completions';
            
            let state = {
                settings: {
                    apiKey: '',
                    model: 'deepseek/deepseek-r1:free',
                    systemPrompt: 'You are a helpful and concise AI assistant.',
                    theme: 'system' // 'light', 'dark', 'system'
                },
                chats: [],
                currentChatId: null,
                isGenerating: false
            };

            // ==========================================
            // 2. DOM ELEMENTS
            // ==========================================
            const els = {
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarBackdrop: document.getElementById('sidebar-backdrop'),
                btnToggleSidebar: document.getElementById('btn-toggle-sidebar'),
                btnCloseSidebar: document.getElementById('btn-close-sidebar'),
                btnNewChat: document.getElementById('btn-new-chat'),
                chatHistoryList: document.getElementById('chat-history-list'),
                
                btnTheme: document.getElementById('btn-theme'),
                btnSettings: document.getElementById('btn-settings'),
                settingsModal: document.getElementById('settings-modal'),
                btnCloseSettings: document.getElementById('btn-close-settings'),
                btnSaveSettings: document.getElementById('btn-save-settings'),
                inputApiKey: document.getElementById('input-api-key'),
                inputModel: document.getElementById('input-model'),
                inputSystemPrompt: document.getElementById('input-system-prompt'),
                
                currentChatTitle: document.getElementById('current-chat-title'),
                chatContainer: document.getElementById('chat-container'),
                welcomeScreen: document.getElementById('welcome-screen'),
                
                chatInput: document.getElementById('chat-input'),
                btnSend: document.getElementById('btn-send')
            };

            // ==========================================
            // 3. INITIALIZATION & STORAGE
            // ==========================================
            function init() {
                loadState();
                applyTheme();
                
                if (state.chats.length === 0) createNewChat();
                else if (!state.currentChatId) switchChat(state.chats[0].id);
                else switchChat(state.currentChatId);

                renderSidebar();
                setupEventListeners();
                
                // Hide loader gracefully
                setTimeout(() => {
                    els.loading.classList.add('opacity-0');
                    setTimeout(() => els.loading.remove(), 300);
                }, 400);
            }

            function loadState() {
                try {
                    const saved = localStorage.getItem('universalAIChatState');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        state.settings = { ...state.settings, ...parsed.settings };
                        state.chats = parsed.chats || [];
                        state.currentChatId = parsed.currentChatId;
                    }
                } catch (e) { console.error("Could not load state", e); }
            }

            function saveState() {
                try {
                    localStorage.setItem('universalAIChatState', JSON.stringify(state));
                } catch (e) { console.error("Could not save state", e); }
            }

            // ==========================================
            // 4. THEME MANAGEMENT
            // ==========================================
            function applyTheme() {
                const isDark = state.settings.theme === 'dark' || 
                              (state.settings.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');

                // Update Icon
                els.btnTheme.innerHTML = isDark 
                    ? `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>` // Sun
                    : `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>`; // Moon
            }

            function toggleTheme() {
                const isDark = document.documentElement.classList.contains('dark');
                state.settings.theme = isDark ? 'light' : 'dark';
                applyTheme();
                saveState();
            }

            // ==========================================
            // 5. CHAT MANAGEMENT & UI
            // ==========================================
            function generateId() { return Date.now().toString(36) + Math.random().toString(36).substring(2); }

            function createNewChat() {
                const newChat = {
                    id: generateId(),
                    title: 'New Chat',
                    messages: [],
                    updatedAt: Date.now()
                };
                state.chats.unshift(newChat);
                switchChat(newChat.id);
            }

            function switchChat(id) {
                if (state.isGenerating) return; // Prevent switching while generating
                state.currentChatId = id;
                saveState();
                renderSidebar();
                renderMessages();
                closeMobileSidebar();
                
                const chat = state.chats.find(c => c.id === id);
                els.currentChatTitle.textContent = chat ? chat.title : 'New Chat';
            }

            function deleteChat(id, event) {
                event.stopPropagation();
                if (state.isGenerating) return;
                
                state.chats = state.chats.filter(c => c.id !== id);
                if (state.chats.length === 0) createNewChat();
                else if (state.currentChatId === id) switchChat(state.chats[0].id);
                else { saveState(); renderSidebar(); }
            }

            function renameChat(id, event) {
                event.stopPropagation();
                const chat = state.chats.find(c => c.id === id);
                if (!chat) return;
                
                const newTitle = prompt("Enter new chat name:", chat.title);
                if (newTitle && newTitle.trim() !== "") {
                    chat.title = newTitle.trim();
                    if (state.currentChatId === id) els.currentChatTitle.textContent = chat.title;
                    saveState();
                    renderSidebar();
                }
            }

            // ==========================================
            // 6. RENDERING
            // ==========================================
            function renderSidebar() {
                els.chatHistoryList.innerHTML = '';
                
                state.chats.forEach(chat => {
                    const isActive = chat.id === state.currentChatId;
                    const el = document.createElement('div');
                    el.className = `group flex items-center justify-between p-2.5 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-blue-50 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300'}`;
                    
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'flex items-center gap-3 overflow-hidden flex-1';
                    titleDiv.innerHTML = `
                        <svg class="w-4 h-4 flex-shrink-0 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        <span class="truncate text-sm">${chat.title}</span>
                    `;
                    el.appendChild(titleDiv);

                    // Actions
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = `flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity ${isActive ? 'opacity-100' : ''}`;
                    
                    const btnRename = document.createElement('button');
                    btnRename.className = 'p-1 hover:text-blue-600 rounded';
                    btnRename.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>`;
                    btnRename.onclick = (e) => renameChat(chat.id, e);
                    
                    const btnDel = document.createElement('button');
                    btnDel.className = 'p-1 hover:text-red-500 rounded';
                    btnDel.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;
                    btnDel.onclick = (e) => deleteChat(chat.id, e);

                    actionsDiv.appendChild(btnRename);
                    actionsDiv.appendChild(btnDel);
                    el.appendChild(actionsDiv);
                    
                    el.onclick = () => switchChat(chat.id);
                    els.chatHistoryList.appendChild(el);
                });
            }

            function renderMessages() {
                const chat = state.chats.find(c => c.id === state.currentChatId);
                
                // Clear existing, keeping welcome screen logic
                const nodesToRemove = Array.from(els.chatContainer.children).filter(node => node.id !== 'welcome-screen');
                nodesToRemove.forEach(node => node.remove());

                if (!chat || chat.messages.length === 0) {
                    els.welcomeScreen.style.display = 'flex';
                    return;
                }
                
                els.welcomeScreen.style.display = 'none';

                chat.messages.forEach((msg, idx) => {
                    const msgEl = createMessageElement(msg.role, msg.content, idx);
                    els.chatContainer.appendChild(msgEl);
                });

                scrollToBottom();
            }

            function createMessageElement(role, content, index) {
                const wrapper = document.createElement('div');
                wrapper.className = `flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
                wrapper.dataset.index = index;

                const inner = document.createElement('div');
                inner.className = `max-w-[85%] md:max-w-[75%] rounded-3xl p-4 md:p-5 ${
                    role === 'user' 
                    ? 'bg-blue-100 dark:bg-blue-900/50 text-gray-900 dark:text-gray-100 rounded-tr-sm' 
                    : 'bg-transparent text-gray-900 dark:text-gray-100'
                }`;

                if (role === 'assistant') {
                    // Avatar + Content layout for AI
                    const flexBox = document.createElement('div');
                    flexBox.className = 'flex gap-4';
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex-shrink-0 flex items-center justify-center text-white';
                    avatar.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>`;
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'prose dark:prose-invert max-w-none w-full break-words markdown-body';
                    contentDiv.innerHTML = marked.parse(content || '...');
                    
                    flexBox.appendChild(avatar);
                    flexBox.appendChild(contentDiv);
                    inner.appendChild(flexBox);
                } else {
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'whitespace-pre-wrap break-words';
                    contentDiv.textContent = content;
                    inner.appendChild(contentDiv);
                }

                wrapper.appendChild(inner);
                return wrapper;
            }

            function scrollToBottom() {
                els.chatContainer.scrollTo({
                    top: els.chatContainer.scrollHeight,
                    behavior: 'smooth'
                });
            }

            // ==========================================
            // 7. API / STREAMING LOGIC
            // ==========================================
            async function sendMessage() {
                const text = els.chatInput.value.trim();
                if (!text || state.isGenerating) return;

                if (!state.settings.apiKey) {
                    alert("Please set your OpenRouter API key in Settings first.");
                    openSettings();
                    return;
                }

                const chat = state.chats.find(c => c.id === state.currentChatId);
                if (!chat) return;

                // Auto-generate title if first message
                if (chat.messages.length === 0) {
                    chat.title = text.length > 25 ? text.substring(0, 25) + '...' : text;
                    els.currentChatTitle.textContent = chat.title;
                    renderSidebar();
                }

                // Add User Message
                chat.messages.push({ role: 'user', content: text });
                els.chatInput.value = '';
                els.chatInput.style.height = 'auto'; // reset height
                renderMessages();

                // Prep AI Message Placeholder
                chat.messages.push({ role: 'assistant', content: '' });
                const aiMsgIndex = chat.messages.length - 1;
                renderMessages(); // Renders the empty bubble with dots
                
                // Get the DOM node of the content div to stream into it directly
                const msgNodes = els.chatContainer.querySelectorAll('[data-index]');
                const latestNode = msgNodes[msgNodes.length - 1];
                const contentTarget = latestNode.querySelector('.markdown-body');

                state.isGenerating = true;
                els.btnSend.disabled = true;

                try {
                    // Prepare messages payload (including system prompt)
                    const apiMessages = [
                        { role: 'system', content: state.settings.systemPrompt },
                        ...chat.messages.slice(0, -1) // Exclude the empty AI message we just pushed
                    ];

                    const response = await fetch(OPENROUTER_API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${state.settings.apiKey}`,
                            'HTTP-Referer': window.location.href, // OpenRouter requirement
                            'X-Title': 'Universal AI Chat'
                        },
                        body: JSON.stringify({
                            model: state.settings.model || 'deepseek/deepseek-r1:free',
                            messages: apiMessages,
                            stream: true
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || `HTTP Error ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let accumulatedContent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');

                        for (const line of lines) {
                            if (line.trim() === '' || line.trim() === 'data: [DONE]') continue;
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.substring(6));
                                    const delta = data.choices[0]?.delta?.content || '';
                                    if (delta) {
                                        accumulatedContent += delta;
                                        // Update state
                                        chat.messages[aiMsgIndex].content = accumulatedContent;
                                        // Update DOM real-time
                                        contentTarget.innerHTML = marked.parse(accumulatedContent);
                                        scrollToBottom();
                                    }
                                } catch (e) {
                                    // Parse error on partial chunk, safe to ignore in SSE
                                    console.warn("SSE JSON Parse error:", e);
                                }
                            }
                        }
                    }

                } catch (error) {
                    console.error("Chat Error:", error);
                    chat.messages[aiMsgIndex].content = `**Error:** ${error.message}. Please check your API key and model name in settings.`;
                    contentTarget.innerHTML = marked.parse(chat.messages[aiMsgIndex].content);
                } finally {
                    chat.updatedAt = Date.now();
                    state.isGenerating = false;
                    els.btnSend.disabled = false;
                    saveState();
                }
            }

            // ==========================================
            // 8. EVENT LISTENERS
            // ==========================================
            function setupEventListeners() {
                // Sidebar Mobile Toggles
                const openSidebar = () => {
                    els.sidebar.classList.remove('-translate-x-full');
                    els.sidebarBackdrop.classList.remove('hidden');
                };
                const closeMobileSidebar = () => {
                    if (window.innerWidth < 768) {
                        els.sidebar.classList.add('-translate-x-full');
                        els.sidebarBackdrop.classList.add('hidden');
                    }
                };

                els.btnToggleSidebar.addEventListener('click', openSidebar);
                els.btnCloseSidebar.addEventListener('click', closeMobileSidebar);
                els.sidebarBackdrop.addEventListener('click', closeMobileSidebar);
                window.closeMobileSidebar = closeMobileSidebar; // attach to window for internal use

                // Theme
                els.btnTheme.addEventListener('click', toggleTheme);

                // Settings
                els.btnSettings.addEventListener('click', openSettings);
                els.btnCloseSettings.addEventListener('click', closeSettings);
                els.btnSaveSettings.addEventListener('click', saveSettings);

                // Chat Actions
                els.btnNewChat.addEventListener('click', createNewChat);

                // Input handling (Auto-resize & Enter to send)
                els.chatInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                });

                els.chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                els.btnSend.addEventListener('click', sendMessage);
            }

            // ==========================================
            // 9. SETTINGS MODAL
            // ==========================================
            function openSettings() {
                els.inputApiKey.value = state.settings.apiKey;
                els.inputModel.value = state.settings.model;
                els.inputSystemPrompt.value = state.settings.systemPrompt;
                
                els.settingsModal.classList.remove('hidden');
                // Trigger reflow
                void els.settingsModal.offsetWidth;
                els.settingsModal.classList.remove('opacity-0');
                els.settingsModal.querySelector('div').classList.remove('scale-95');
                
                closeMobileSidebar();
            }

            function closeSettings() {
                els.settingsModal.classList.add('opacity-0');
                els.settingsModal.querySelector('div').classList.add('scale-95');
                setTimeout(() => els.settingsModal.classList.add('hidden'), 200);
            }

            function saveSettings() {
                state.settings.apiKey = els.inputApiKey.value.trim();
                state.settings.model = els.inputModel.value.trim() || 'deepseek/deepseek-r1:free';
                state.settings.systemPrompt = els.inputSystemPrompt.value.trim() || 'You are a helpful AI assistant.';
                saveState();
                closeSettings();
            }

            // Start app
            init();
        });
    </script>
</body>
</html>
