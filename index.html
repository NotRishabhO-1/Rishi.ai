<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rishi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .cursor-blink { display: inline-block; width: 8px; height: 18px; background: #3b82f6; margin-left: 2px; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #app { display: none; }
        #loading { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: white; z-index: 9999; }
        .dark #loading { background: #0f172a; color: white; }
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; z-index: 50; transition: transform 0.3s; width: 280px; height: 100%; }
            #sidebar.open { transform: translateX(280px); }
            #sidebar-overlay.open { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 40; }
        }
        .prose pre { background: #1e293b; color: white; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors">

    <div id="loading"><b>Rishi AI Initializing...</b></div>

    <div id="app" class="flex h-screen">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <aside id="sidebar" class="bg-white dark:bg-slate-800 border-r dark:border-slate-700 flex flex-col p-4">
            <h1 class="font-bold text-xl mb-6 flex items-center gap-2">
                <span class="bg-blue-600 text-white px-2 rounded">R</span> Rishi AI
            </h1>
            <button onclick="createNewChat()" class="w-full bg-slate-900 dark:bg-blue-600 text-white py-2 rounded-xl mb-4">+ New Chat</button>
            <div id="history" class="flex-1 overflow-y-auto space-y-1"></div>
            <button onclick="openSettings()" class="mt-4 text-sm text-slate-500">⚙️ Settings</button>
        </aside>

        <main class="flex-1 flex flex-col relative bg-white dark:bg-slate-900">
            <header class="h-14 border-b dark:border-slate-800 flex items-center px-4 justify-between">
                <button onclick="toggleSidebar()" class="md:hidden">☰</button>
                <div id="chat-title" class="font-medium truncate">New Chat</div>
                <button onclick="toggleDarkMode()">🌓</button>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6">
                </div>

            <div class="p-4 max-w-4xl mx-auto w-full">
                <div class="relative">
                    <textarea id="input" rows="1" class="w-full p-4 pr-12 rounded-2xl border dark:border-slate-700 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="Ask Rishi AI..."></textarea>
                    <button id="send-btn" onclick="send()" class="absolute right-2 bottom-2 bg-blue-600 text-white p-2 rounded-xl disabled:opacity-50">➔</button>
                </div>
            </div>
        </main>

        <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[100]">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl w-full max-w-md">
                <h2 class="text-xl font-bold mb-4">Settings</h2>
                <input id="key-in" type="password" class="w-full p-2 mb-3 border rounded dark:bg-slate-900" placeholder="OpenRouter API Key">
                <input id="mod-in" type="text" class="w-full p-2 mb-4 border rounded dark:bg-slate-900" placeholder="Model (e.g. deepseek/deepseek-r1:free)">
                <button onclick="saveSet()" class="w-full bg-blue-600 text-white py-2 rounded-lg">Save & Close</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            key: localStorage.getItem('r_key') || '',
            mod: localStorage.getItem('r_mod') || 'deepseek/deepseek-r1:free',
            chats: JSON.parse(localStorage.getItem('r_chats')) || [],
            activeId: null,
            isDark: localStorage.getItem('r_dark') === 'true'
        };

        function init() {
            if(state.isDark) document.documentElement.classList.add('dark');
            renderHistory();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        }

        async function send() {
            const val = document.getElementById('input').value.trim();
            if(!val || !state.key) return !state.key ? openSettings() : null;

            if(!state.activeId) createNewChat(false);
            const chat = state.chats.find(c => c.id === state.activeId);
            
            // 1. Add User Message
            chat.messages.push({ role: 'user', content: val });
            document.getElementById('input').value = '';
            renderMessages();

            // 2. Add empty AI bubble for streaming
            const aiMsg = { role: 'assistant', content: '' };
            chat.messages.push(aiMsg);
            renderMessages();

            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${state.key}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Rishi AI'
                    },
                    body: JSON.stringify({ model: state.mod, messages: chat.messages.slice(0, -1), stream: true })
                });

                if(!res.ok) throw new Error(await res.text());

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                const lastMsgBody = document.querySelector('#chat-box > div:last-child .msg-body');

                while(true) {
                    const { done, value } = await reader.read();
                    if(done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const text = json.choices[0]?.delta?.content || '';
                                aiMsg.content += text;
                                lastMsgBody.innerHTML = marked.parse(aiMsg.content + '<span class="cursor-blink"></span>');
                                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
                            } catch(e) {}
                        }
                    }
                }
                lastMsgBody.innerHTML = marked.parse(aiMsg.content);
            } catch(e) {
                alert("Error: " + e.message);
                aiMsg.content = "⚠️ Failed to get response. Check API Key or Model.";
                renderMessages();
            } finally {
                save();
            }
        }

        function createNewChat(render = true) {
            const id = Date.now().toString();
            state.chats.unshift({ id, title: 'New Chat', messages: [] });
            state.activeId = id;
            if(render) renderMessages();
            renderHistory();
            save();
        }

        function renderMessages() {
            const chat = state.chats.find(c => c.id === state.activeId);
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            if(!chat) return;
            chat.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`;
                div.innerHTML = `<div class="max-w-[80%] p-3 rounded-xl shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-slate-800 prose dark:prose-invert'}">
                    <div class="msg-body">${marked.parse(m.content)}</div>
                </div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        function renderHistory() {
            const h = document.getElementById('history');
            h.innerHTML = '';
            state.chats.forEach(c => {
                const d = document.createElement('div');
                d.className = `p-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-700 rounded ${state.activeId === c.id ? 'bg-blue-50 dark:bg-blue-900/30 font-bold' : ''}`;
                d.innerText = c.messages.length > 0 ? c.messages[0].content.substring(0, 20) : 'New Chat';
                d.onclick = () => { state.activeId = c.id; renderMessages(); renderHistory(); };
                h.appendChild(d);
            });
        }

        function openSettings() { document.getElementById('modal').style.display = 'flex'; document.getElementById('key-in').value = state.key; document.getElementById('mod-in').value = state.mod; }
        function saveSet() { state.key = document.getElementById('key-in').value; state.mod = document.getElementById('mod-in').value; localStorage.setItem('r_key', state.key); localStorage.setItem('r_mod', state.mod); document.getElementById('modal').style.display = 'none'; }
        function save() { localStorage.setItem('r_chats', JSON.stringify(state.chats)); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
        function toggleDarkMode() { state.isDark = !state.isDark; document.documentElement.classList.toggle('dark'); localStorage.setItem('r_dark', state.isDark); }

        window.onload = init;
    </script>
</body>
</html>
