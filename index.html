<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rishi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        /* Mobile safe full-height */
        body, html { height: 100dvh; overflow: hidden; background-color: #f8fafc; color: #0f172a; }
        .dark { background-color: #0f172a; color: #f8fafc; }
        
        /* Markdown Code Blocks */
        .markdown-body pre { background: #1e293b !important; color: #e2e8f0 !important; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px; margin-bottom: 8px; }
        .markdown-body code { font-family: monospace; background: rgba(150,150,150,0.2); padding: 2px 4px; border-radius: 4px; }
        .markdown-body p { margin-bottom: 8px; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .dark #loader { background: #0f172a; color: #fff; }
        
        /* Layout */
        #app { display: none; height: 100%; width: 100%; display: flex; flex-direction: row; }
        
        /* Sidebar Mobile */
        #sidebar { width: 280px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        .dark #sidebar { background: #1e293b; border-right-color: #334155; }
        
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -280px; top: 0; bottom: 0; z-index: 50; }
            #sidebar.open { transform: translateX(280px); }
            #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
            #overlay.open { display: block; }
        }

        /* Main Chat Area */
        #main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
        
        /* Typing indicator */
        .typing { display: inline-block; width: 6px; height: 16px; background: #3b82f6; animation: blink 1s step-end infinite; vertical-align: bottom; margin-left: 4px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="transition-colors duration-200">

    <div id="loader">
        <h2 class="text-2xl font-bold mb-2">Rishi AI</h2>
        <p class="text-sm text-gray-500">Starting engine...</p>
    </div>

    <div id="app" style="display: none;">
        <div id="overlay" onclick="toggleMenu()"></div>

        <aside id="sidebar" class="p-4">
            <div class="flex items-center gap-2 font-bold text-xl mb-6 text-blue-600 dark:text-blue-400">
                <div class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-lg">R</div>
                Rishi AI
            </div>

            <button onclick="newChat()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition mb-4">
                + New Chat
            </button>

            <div id="chat-list" class="flex-1 overflow-y-auto space-y-1">
                </div>

            <div class="mt-4 border-t border-gray-200 dark:border-gray-700 pt-4 space-y-2">
                <button onclick="toggleTheme()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-sm font-medium">🌓 Toggle Theme</button>
                <button onclick="openConfig()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-sm font-medium">⚙️ Settings</button>
            </div>
        </aside>

        <main id="main" class="bg-gray-50 dark:bg-slate-900">
            <header class="h-14 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 shrink-0">
                <button onclick="toggleMenu()" class="md:hidden p-2 text-gray-600 dark:text-gray-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div id="header-title" class="font-semibold text-sm truncate max-w-[200px]">New Chat</div>
                <div class="w-8"></div> </header>

            <div id="chat-window" class="flex-col space-y-6 pb-4">
                <div id="welcome-msg" class="flex flex-col items-center justify-center h-full text-center text-gray-500 dark:text-gray-400">
                    <span class="text-4xl mb-4">👋</span>
                    <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100">Welcome to Rishi AI</h2>
                    <p class="text-sm mt-2 max-w-xs">Enter your OpenRouter key in Settings, then say hello!</p>
                </div>
            </div>

            <div class="p-3 bg-white dark:bg-slate-800 border-t border-gray-200 dark:border-gray-700 shrink-0">
                <div class="max-w-4xl mx-auto relative flex items-end gap-2">
                    <textarea id="prompt-input" rows="1" 
                        class="w-full bg-gray-100 dark:bg-slate-900 dark:text-white border-none rounded-xl py-3 px-4 resize-none outline-none focus:ring-2 focus:ring-blue-500 max-h-32 overflow-y-auto" 
                        placeholder="Ask anything..."></textarea>
                    
                    <button id="send-btn" onclick="sendMessage()" 
                        class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed shrink-0 transition">
                        <svg class="w-6 h-6 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </main>

        <div id="config-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
            <div class="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <h3 class="text-xl font-bold mb-4 dark:text-white">API Configuration</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">OpenRouter Key</label>
                        <input id="api-key" type="password" class="w-full bg-gray-100 dark:bg-slate-900 border-none p-3 rounded-lg dark:text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="sk-or-v1-...">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Select Model</label>
                        <select id="model-select" class="w-full bg-gray-100 dark:bg-slate-900 border-none p-3 rounded-lg dark:text-white outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Very Reliable)</option>
                            <option value="google/gemini-2.0-pro-exp-02-05:free">Gemini 2.0 Pro (Fast)</option>
                            <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Good for coding)</option>
                        </select>
                    </div>
                </div>

                <div class="mt-6 flex gap-3">
                    <button onclick="saveConfig()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">Save</button>
                    <button onclick="closeConfig()" class="px-6 py-3 bg-gray-200 dark:bg-slate-700 rounded-lg font-bold dark:text-white">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. STATE MANAGEMENT
        let AppState = {
            key: localStorage.getItem('rishi_key') || '',
            model: localStorage.getItem('rishi_model') || 'meta-llama/llama-3.3-70b-instruct:free',
            dark: localStorage.getItem('rishi_dark') === 'true',
            chats: JSON.parse(localStorage.getItem('rishi_chats')) || [],
            currentId: null,
            isGenerating: false
        };

        // 2. DOM ELEMENTS
        const DOM = {
            loader: document.getElementById('loader'),
            app: document.getElementById('app'),
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            chatWindow: document.getElementById('chat-window'),
            chatList: document.getElementById('chat-list'),
            input: document.getElementById('prompt-input'),
            sendBtn: document.getElementById('send-btn'),
            headerTitle: document.getElementById('header-title'),
            welcomeMsg: document.getElementById('welcome-msg'),
            modal: document.getElementById('config-modal')
        };

        // 3. INITIALIZATION
        function bootApp() {
            try {
                if (AppState.dark) document.body.classList.add('dark');
                
                // Attach Enter key listener safely
                DOM.input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                // Auto-resize textarea
                DOM.input.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
                });

                renderChatList();
                
                // Hide loader, show app
                setTimeout(() => {
                    DOM.loader.style.display = 'none';
                    DOM.app.style.display = 'flex';
                }, 300);

            } catch (error) {
                console.error("Boot failure:", error);
                DOM.loader.innerHTML = `<p style="color:red">Fatal Error starting app. Check console.</p>`;
            }
        }

        // 4. CHAT LOGIC
        async function sendMessage() {
            const text = DOM.input.value.trim();
            if (!text || AppState.isGenerating) return;

            if (!AppState.key) {
                alert("Please add your OpenRouter API Key in Settings first.");
                openConfig();
                return;
            }

            // Create new chat if none exists
            if (!AppState.currentId) newChat(false);
            
            const activeChat = AppState.chats.find(c => c.id === AppState.currentId);
            
            // Push User Message
            activeChat.messages.push({ role: 'user', content: text });
            
            // Update UI
            DOM.input.value = '';
            DOM.input.style.height = 'auto';
            DOM.welcomeMsg.style.display = 'none';
            drawMessages();

            // Prepare AI Message placeholder
            const aiMsgObj = { role: 'assistant', content: '' };
            activeChat.messages.push(aiMsgObj);
            
            // Create DOM element for AI to type into
            const aiBubbleId = `msg-${Date.now()}`;
            const aiWrapper = document.createElement('div');
            aiWrapper.className = "flex justify-start mb-4";
            aiWrapper.innerHTML = `
                <div class="max-w-[85%] bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-2xl rounded-tl-sm p-4 shadow-sm">
                    <div id="${aiBubbleId}" class="markdown-body text-sm text-gray-800 dark:text-gray-200">
                        <span class="typing"></span>
                    </div>
                </div>
            `;
            DOM.chatWindow.appendChild(aiWrapper);
            scrollToBottom();

            // Trigger Fetch
            await fetchAIResponse(activeChat, aiMsgObj, aiBubbleId);
        }

        // 5. BULLETPROOF STREAMING FETCH
        async function fetchAIResponse(chatInfo, aiMsgObj, bubbleId) {
            AppState.isGenerating = true;
            DOM.sendBtn.disabled = true;
            const bubbleEl = document.getElementById(bubbleId);

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${AppState.key}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, // CRITICAL FOR OPENROUTER
                        "X-Title": "Rishi AI"                 // CRITICAL FOR OPENROUTER
                    },
                    body: JSON.stringify({
                        model: AppState.model,
                        messages: chatInfo.messages.slice(0, -1), // Send all except the empty AI one
                        stream: true
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API Error ${response.status}: ${errorText}`);
                }

                // Parse stream properly
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep the last incomplete line in buffer

                    for (const line of lines) {
                        if (line.trim() === "") continue;
                        if (line.startsWith("data: ")) {
                            const jsonStr = line.substring(6);
                            if (jsonStr.trim() === "[DONE]") continue;

                            try {
                                const payload = JSON.parse(jsonStr);
                                const token = payload.choices[0]?.delta?.content || "";
                                aiMsgObj.content += token;
                                
                                // Render markdown safely
                                bubbleEl.innerHTML = safeMarkdown(aiMsgObj.content) + '<span class="typing"></span>';
                                scrollToBottom();
                            } catch (e) {
                                console.warn("Stream parse error (ignoring):", e);
                            }
                        }
                    }
                }
                
                // Stream finished successfully
                bubbleEl.innerHTML = safeMarkdown(aiMsgObj.content);

            } catch (error) {
                console.error("Fetch failed:", error);
                aiMsgObj.content = `**Error:** ${error.message}\n\n*If you see code 429, the free model is currently overloaded. Please wait or change models.*`;
                bubbleEl.innerHTML = safeMarkdown(aiMsgObj.content);
            } finally {
                AppState.isGenerating = false;
                DOM.sendBtn.disabled = false;
                saveData();
                renderChatList();
            }
        }

        // 6. UI HELPERS
        function safeMarkdown(text) {
            if (typeof marked !== 'undefined') {
                return marked.parse(text);
            }
            // Fallback if marked.js CDN is blocked
            return text.replace(/\n/g, '<br>');
        }

        function drawMessages() {
            DOM.chatWindow.innerHTML = '';
            const chat = AppState.chats.find(c => c.id === AppState.currentId);
            
            if (!chat || chat.messages.length === 0) {
                DOM.chatWindow.appendChild(DOM.welcomeMsg);
                DOM.welcomeMsg.style.display = 'flex';
                DOM.headerTitle.innerText = "New Chat";
                return;
            }

            DOM.headerTitle.innerText = chat.messages[0].content.substring(0, 25) + "...";

            chat.messages.forEach(msg => {
                const isUser = msg.role === 'user';
                const wrapper = document.createElement('div');
                wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`;
                
                const innerClass = isUser 
                    ? "bg-blue-600 text-white rounded-2xl rounded-tr-sm p-4 max-w-[85%] shadow-sm text-sm"
                    : "bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-800 dark:text-gray-200 rounded-2xl rounded-tl-sm p-4 max-w-[85%] shadow-sm text-sm markdown-body overflow-x-auto";
                
                wrapper.innerHTML = `<div class="${innerClass}">${isUser ? escapeHTML(msg.content) : safeMarkdown(msg.content)}</div>`;
                DOM.chatWindow.appendChild(wrapper);
            });
            scrollToBottom();
        }

        function renderChatList() {
            DOM.chatList.innerHTML = '';
            AppState.chats.forEach(chat => {
                const isActive = chat.id === AppState.currentId;
                const title = chat.messages.length > 0 ? chat.messages[0].content.substring(0, 20) + "..." : "New Chat";
                
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 rounded-xl text-sm truncate flex items-center justify-between group ${isActive ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 font-bold' : 'hover:bg-gray-100 dark:hover:bg-gray-800 dark:text-gray-300'}`;
                btn.innerHTML = `
                    <span>💬 ${escapeHTML(title)}</span>
                    <span onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 text-red-500 hover:scale-110 transition shrink-0">✕</span>
                `;
                btn.onclick = (e) => { 
                    if (e.target.tagName !== 'SPAN' || !e.target.classList.contains('text-red-500')) {
                        switchChat(chat.id);
                    }
                };
                DOM.chatList.appendChild(btn);
            });
        }

        // 7. STATE ACTIONS
        function newChat(render = true) {
            const id = 'chat_' + Date.now();
            AppState.chats.unshift({ id: id, messages: [] });
            AppState.currentId = id;
            saveData();
            if (render) {
                renderChatList();
                drawMessages();
                if (window.innerWidth < 768) toggleMenu();
            }
        }

        function switchChat(id) {
            if (AppState.isGenerating) return;
            AppState.currentId = id;
            drawMessages();
            renderChatList();
            if (window.innerWidth < 768) toggleMenu();
        }

        function deleteChat(id, event) {
            event.stopPropagation(); // Stop click from triggering switchChat
            AppState.chats = AppState.chats.filter(c => c.id !== id);
            if (AppState.currentId === id) AppState.currentId = null;
            saveData();
            renderChatList();
            drawMessages();
        }

        // 8. SETTINGS & UTILS
        function toggleMenu() {
            DOM.sidebar.classList.toggle('open');
            DOM.overlay.classList.toggle('open');
        }

        function toggleTheme() {
            AppState.dark = !AppState.dark;
            if (AppState.dark) document.body.classList.add('dark');
            else document.body.classList.remove('dark');
            localStorage.setItem('rishi_dark', AppState.dark);
        }

        function openConfig() {
            document.getElementById('api-key').value = AppState.key;
            
            // Ensure the select dropdown matches the state, or add it if custom
            const selectEl = document.getElementById('model-select');
            const options = Array.from(selectEl.options).map(o => o.value);
            if (!options.includes(AppState.model)) {
                const newOpt = new Option(AppState.model, AppState.model);
                selectEl.add(newOpt);
            }
            selectEl.value = AppState.model;
            
            DOM.modal.style.display = 'flex';
        }

        function closeConfig() {
            DOM.modal.style.display = 'none';
        }

        function saveConfig() {
            AppState.key = document.getElementById('api-key').value.trim();
            AppState.model = document.getElementById('model-select').value;
            localStorage.setItem('rishi_key', AppState.key);
            localStorage.setItem('rishi_model', AppState.model);
            closeConfig();
        }

        function saveData() {
            localStorage.setItem('rishi_chats', JSON.stringify(AppState.chats));
        }

        function scrollToBottom() {
            setTimeout(() => { DOM.chatWindow.scrollTop = DOM.chatWindow.scrollHeight; }, 50);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        // FIRE!
        window.addEventListener('DOMContentLoaded', bootApp);
    </script>
</body>
</html>
