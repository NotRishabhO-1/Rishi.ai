<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rishi.ai | Gemini Edition</title>
    <script type="importmap">
        {
          "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
          }
        }
    </script>
    <style>
        :root {
            --bg-color: #f0f4f9;
            --sidebar-color: #ffffff;
            --text-color: #1f1f1f;
            --input-bg: #ffffff;
            --accent-color: #1a73e8;
            --bot-msg-bg: transparent;
            --user-msg-bg: #e9eef6;
        }

        [data-theme="dark"] {
            --bg-color: #131314;
            --sidebar-color: #1e1f20;
            --text-color: #e3e3e3;
            --input-bg: #1e1f20;
            --accent-color: #8ab4f8;
            --bot-msg-bg: transparent;
            --user-msg-bg: #37393b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            transition: 0.3s;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .logo { font-size: 22px; font-weight: bold; margin-bottom: 30px; }
        .logo span { color: var(--accent-color); }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 16px;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border: 1px solid rgba(128, 128, 128, 0.2);
        }

        /* Input Area */
        .input-wrapper {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            position: sticky;
            bottom: 0;
            background: linear-gradient(transparent, var(--bg-color) 20%);
        }

        .input-box {
            background-color: var(--input-bg);
            border: 1px solid rgba(128,128,128,0.3);
            border-radius: 30px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-color);
            font-size: 16px;
            padding: 10px 0;
        }

        .send-btn, .theme-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--accent-color);
            font-weight: bold;
            padding: 10px;
        }

        .theme-btn { margin-top: auto; color: var(--text-color); border: 1px solid gray; border-radius: 10px; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Rishi<span>.ai</span></div>
        <div>New Chat</div>
        <button class="theme-btn" onclick="toggleTheme()">Toggle Dark/Light</button>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chat">
            <div class="message bot-message">Hello! I am Rishi.ai. How can I help you today?</div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Enter a prompt here..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // 1. PUT YOUR API KEY HERE
        const API_KEY = "AIzaSyAUvnsysMJVBW4Bd4PFeb7De_MqLa1U0U4"; 
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });

        window.sendMessage = async () => {
            const input = document.getElementById("userInput");
            const chat = document.getElementById("chat");
            const text = input.value.trim();

            if (!text) return;

            // Add User Message
            chat.innerHTML += `<div class="message user-message">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const result = await model.generateContent(text);
                const response = await result.response;
                const botText = response.text();

                // Add Bot Message
                chat.innerHTML += `<div class="message bot-message">${botText}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<div class="message bot-message" style="color:red">Error: ${error.message}</div>`;
            }
        };

        window.handleKey = (e) => { if(e.key === 'Enter') sendMessage(); };

        window.toggleTheme = () => {
            const body = document.body;
            const current = body.getAttribute("data-theme");
            body.setAttribute("data-theme", current === "dark" ? "light" : "dark");
        };
    </script>
</body>
</html>
